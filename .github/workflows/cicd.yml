name: CI/CD

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      environment:
        description: "Target environment"
        required: false
        default: "dev"
        type: choice
        options: [dev, prod]
  workflow_call:
    inputs:
      environment:
        required: true
        type: string
      tag_name:
        required: false
        type: string
        default: ""

# One deployment at a time per environment — queue, never cancel.
concurrency:
  group: deploy-${{ inputs.environment || (startsWith(github.ref, 'refs/tags/v') && 'prod' || 'dev') }}
  cancel-in-progress: false

permissions:
  contents: write       # create tags + GitHub Releases
  pull-requests: read

env:
  AWS_DEFAULT_REGION: us-east-1
  NODE_VERSION: "22"

# ─────────────────────────────────────────────────────────────────────────────

jobs:
  # ─── 1. Detect changes & environment ───────────────────────────────────────
  changes:
    name: Detect changes
    runs-on: ubuntu-latest
    outputs:
      services:    ${{ steps.filter.outputs.services }}
      infra:       ${{ steps.filter.outputs.infra }}
      infra_drift: ${{ steps.drift.outputs.drift }}
      environment: ${{ steps.ctx.outputs.environment }}
      stack_name:  ${{ steps.ctx.outputs.stack_name }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Resolve environment context
        id: ctx
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" || \
                "${{ github.event_name }}" == "workflow_call" ]]; then
            ENV="${{ inputs.environment }}"
            ENV="${ENV:-dev}"
          elif [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            ENV="prod"
          else
            ENV="dev"
          fi
          STACK="DecoupleServicesStack-Dev"
          [[ "$ENV" == "prod" ]] && STACK="DecoupleServicesStack-Prod"
          echo "environment=$ENV"  >> "$GITHUB_OUTPUT"
          echo "stack_name=$STACK" >> "$GITHUB_OUTPUT"
          echo "Resolved: env=$ENV  stack=$STACK"

      - name: Path filter
        id: filter
        uses: dorny/paths-filter@v4
        with:
          filters: |
            infra:
              - 'infra/**'
            services:
              - 'apps/**'
              - 'packages/**'

      # Drift check requires AWS — skip on PRs (no secrets available)
      - name: Install workspace deps (drift check)
        if: github.event_name != 'pull_request'
        run: npm ci

      - name: Install infra deps (drift check)
        if: github.event_name != 'pull_request'
        run: npm ci
        working-directory: infra

      - uses: aws-actions/configure-aws-credentials@v6
        if: github.event_name != 'pull_request'
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: CDK drift check
        id: drift
        if: github.event_name != 'pull_request'
        run: |
          STATUS=$(aws cloudformation describe-stacks \
            --stack-name ${{ steps.ctx.outputs.stack_name }} \
            --query 'Stacks[0].StackStatus' --output text 2>/dev/null \
            || echo "DOES_NOT_EXIST")

          if [[ "$STATUS" == "DOES_NOT_EXIST" ]]; then
            echo "Stack not found — first deploy."
            echo "drift=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          DIFF=$(cd infra && npx cdk diff ${{ steps.ctx.outputs.stack_name }} \
            -c environment=${{ steps.ctx.outputs.environment }} 2>&1 || true)

          if echo "$DIFF" | grep -qE '\[\+\]|\[-\]|\[~\]'; then
            echo "drift=true"  >> "$GITHUB_OUTPUT"
          else
            echo "drift=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Set drift=false (PR)
        id: drift_pr
        if: github.event_name == 'pull_request'
        run: echo "drift=false" >> "$GITHUB_OUTPUT"

  # ─── 2. Validate — PRs only (required status check) ────────────────────────
  validate:
    name: validate
    runs-on: ubuntu-latest
    needs: changes
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install workspace deps
        run: npm ci

      - name: Lint
        run: npm run lint
        working-directory: apps/identification

      - name: Type-check app
        run: npx tsc --noEmit
        working-directory: apps/identification

      - name: Install infra deps
        run: npm ci
        working-directory: infra

      - name: Type-check infra
        run: npx tsc --noEmit
        working-directory: infra

  # ─── 3. Deploy infrastructure — CDK (only when infra/ changed or drift) ────
  deploy-infra:
    name: Deploy infra → ${{ needs.changes.outputs.environment }}
    runs-on: ubuntu-latest
    needs: changes
    if: |
      github.event_name != 'pull_request' && (
        needs.changes.outputs.infra      == 'true' ||
        needs.changes.outputs.infra_drift == 'true' ||
        github.event_name == 'workflow_dispatch' ||
        github.event_name == 'workflow_call'
      )
    environment: ${{ needs.changes.outputs.environment }}
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install workspace deps
        run: npm ci

      - name: Install infra deps
        run: npm ci
        working-directory: infra

      - uses: aws-actions/configure-aws-credentials@v6
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      # ── MUST run before CDK deploy ──────────────────────────────────────────
      # CloudFormation resolves the secret values into Lambda environment
      # variables at deploy time (dynamic references). If the secret doesn't
      # exist yet (first deploy) this step creates it; otherwise it updates it.
      # Either way, CDK always sees the real values — never placeholders.
      - name: Create or update app secret in Secrets Manager
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          CORS_ORIGINS: ${{ secrets.CORS_ORIGINS }}
          LOG_LEVEL:    ${{ secrets.LOG_LEVEL }}
        run: |
          ENV="${{ needs.changes.outputs.environment }}"
          SECRET_NAME="decouple-services/${ENV}/app"
          SECRET_JSON=$(jq -n \
            --arg db   "$DATABASE_URL" \
            --arg cors "$CORS_ORIGINS" \
            --arg log  "$LOG_LEVEL" \
            '{DATABASE_URL:$db,CORS_ORIGINS:$cors,LOG_LEVEL:$log}')

          if aws secretsmanager describe-secret --secret-id "$SECRET_NAME" &>/dev/null; then
            aws secretsmanager put-secret-value \
              --secret-id "$SECRET_NAME" \
              --secret-string "$SECRET_JSON"
            echo "✅ Secret updated: $SECRET_NAME"
          else
            aws secretsmanager create-secret \
              --name "$SECRET_NAME" \
              --description "Runtime configuration for decouple-services Lambda ($ENV)" \
              --secret-string "$SECRET_JSON"
            echo "✅ Secret created: $SECRET_NAME"
          fi

      - name: Ensure shared stack is deployed
        working-directory: infra
        env:
          AWS_ACCOUNT_ID: ${{ secrets.aws_account }}
        run: |
          STATUS=$(aws cloudformation describe-stacks \
            --stack-name DecoupleServicesSharedStack \
            --query 'Stacks[0].StackStatus' --output text 2>/dev/null \
            || echo "DOES_NOT_EXIST")

          if [[ "$STATUS" == "DOES_NOT_EXIST" ]]; then
            echo "Shared stack missing — deploying..."
            npx cdk deploy DecoupleServicesSharedStack --require-approval never
          elif [[ "$STATUS" == *ROLLBACK* || "$STATUS" == *FAILED* ]]; then
            echo "❌ Shared stack in '$STATUS' — manual intervention required."
            exit 1
          else
            echo "✅ Shared stack exists ($STATUS)."
          fi

      - name: CDK deploy ${{ needs.changes.outputs.stack_name }}
        working-directory: infra
        env:
          AWS_ACCOUNT_ID: ${{ secrets.aws_account }}
        run: |
          npx cdk deploy ${{ needs.changes.outputs.stack_name }} \
            -c environment=${{ needs.changes.outputs.environment }} \
            --require-approval never

  # ─── 4. Deploy Lambda code — fast path (only when apps/ changed) ───────────
  #   Runs after deploy-infra (or skips it). Never runs in parallel with it
  #   to avoid race conditions on the same Lambda function.
  deploy-lambda:
    name: Deploy Lambda → ${{ needs.changes.outputs.environment }}
    runs-on: ubuntu-latest
    needs: [changes, deploy-infra]
    if: |
      always() &&
      github.event_name != 'pull_request' && (
        needs.changes.outputs.services == 'true' ||
        github.event_name == 'workflow_dispatch' ||
        github.event_name == 'workflow_call'
      ) &&
      (needs.deploy-infra.result == 'success' || needs.deploy-infra.result == 'skipped')
    environment: ${{ needs.changes.outputs.environment }}
    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install workspace deps
        run: npm ci

      - uses: aws-actions/configure-aws-credentials@v6
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Lint
        run: npm run lint
        working-directory: apps/identification

      - name: Build Lambda (production)
        run: npm run build:lambda:prod
        working-directory: apps/identification

      - name: Run migrations
        run: npm run migrate
        working-directory: apps/identification

      - name: Package Lambda artifact
        # esbuild outputs a self-contained bundle — zip only the bundle file
        run: cd apps/identification/dist && zip ../../../deploy.zip index.js

      - name: Report artifact size
        run: |
          SIZE_BYTES=$(stat -c%s deploy.zip)
          SIZE_KB=$(echo "scale=2; $SIZE_BYTES / 1024" | bc)
          SIZE_MB=$(echo "scale=4; $SIZE_BYTES / 1048576" | bc)
          echo "deploy.zip → ${SIZE_BYTES} bytes (${SIZE_KB} KB / ${SIZE_MB} MB)"

      - name: Deploy to AWS Lambda
        env:
          ENV: ${{ needs.changes.outputs.environment }}
        run: |
          FUNCTION_NAME="decouple-services-${ENV}-function"
          RETRY_COUNT=5
          RETRY_INTERVAL=10

          for i in $(seq 1 $RETRY_COUNT); do
            aws lambda update-function-code \
              --function-name "$FUNCTION_NAME" \
              --zip-file fileb://deploy.zip && break
            if [ "$i" -eq "$RETRY_COUNT" ]; then
              echo "❌ Max retries reached."
              exit 1
            fi
            echo "Retrying in ${RETRY_INTERVAL}s... (attempt $i/$RETRY_COUNT)"
            sleep $RETRY_INTERVAL
          done

          echo "✅ Lambda code updated: $FUNCTION_NAME"

  # ─── 5. Post-deploy health check ────────────────────────────────────────────
  health:
    name: Health check
    runs-on: ubuntu-latest
    needs: [changes, deploy-infra, deploy-lambda]
    if: |
      always() && !cancelled() &&
      (needs.deploy-infra.result == 'success' || needs.deploy-lambda.result == 'success')
    steps:
      - uses: aws-actions/configure-aws-credentials@v6
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Get API endpoint
        id: endpoint
        run: |
          URL=$(aws cloudformation describe-stacks \
            --stack-name ${{ needs.changes.outputs.stack_name }} \
            --query 'Stacks[0].Outputs[?OutputKey==`ApiEndpoint`].OutputValue' \
            --output text)
          echo "url=$URL" >> "$GITHUB_OUTPUT"
          echo "🚀 API endpoint: $URL"

      - name: Wait for Lambda cold-start
        run: sleep 5

      - name: GET /
        run: |
          URL="${{ steps.endpoint.outputs.url }}"
          for i in 1 2 3; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" "$URL/")
            echo "Attempt $i → HTTP $STATUS"
            [[ "$STATUS" == "200" ]] && echo "✅ Root healthy." && exit 0
            sleep 10
          done
          echo "❌ Root endpoint unreachable." && exit 1

      - name: GET /api/v1/health
        run: |
          URL="${{ steps.endpoint.outputs.url }}"
          for i in 1 2 3; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" "$URL/api/v1/health")
            echo "Attempt $i → HTTP $STATUS"
            [[ "$STATUS" == "200" ]] && echo "✅ Health endpoint healthy." && exit 0
            sleep 10
          done
          echo "❌ Health endpoint unreachable." && exit 1

  # ─── 6. Tag & GitHub Release — prod only ────────────────────────────────────
  tag-release:
    name: Tag & Release
    runs-on: ubuntu-latest
    needs: [changes, health]
    if: needs.changes.outputs.environment == 'prod' && needs.health.result == 'success'
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Determine release tag
        id: tag
        run: |
          if [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            TAG="${GITHUB_REF#refs/tags/}"
          elif [[ -n "${{ inputs.tag_name }}" ]]; then
            TAG="${{ inputs.tag_name }}"
            git tag "$TAG" && git push origin "$TAG"
          else
            LAST=$(git tag -l 'v*' --sort=-version:refname | head -1)
            if [[ -z "$LAST" ]]; then
              TAG="v1.0.0"
            else
              MAJOR=$(echo "$LAST" | sed 's/^v//' | cut -d. -f1)
              MINOR=$(echo "$LAST" | cut -d. -f2)
              TAG="v${MAJOR}.$((MINOR + 1)).0"
            fi
            git tag "$TAG" && git push origin "$TAG"
          fi
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "Tag: $TAG"

      - name: Generate changelog
        id: changelog
        run: |
          TAG="${{ steps.tag.outputs.tag }}"
          PREV=$(git tag -l 'v*' --sort=-version:refname | grep -v "^${TAG}$" | head -1)
          if [[ -z "$PREV" ]]; then
            LOG=$(git log --pretty=format:"- %s (%h)" --no-merges | head -30)
          else
            LOG=$(git log "${PREV}..${TAG}" --pretty=format:"- %s (%h)" --no-merges)
          fi
          { echo "log<<EOF"; echo "$LOG"; echo "EOF"; } >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name:     ${{ steps.tag.outputs.tag }}
          release_name: ${{ steps.tag.outputs.tag }}
          body: |
            ## Changes
            ${{ steps.changelog.outputs.log }}

            ## Infrastructure
            - Stack: `${{ needs.changes.outputs.stack_name }}`
            - Account: `682079544132` · Region: `us-east-1`
            - Commit: `${{ github.sha }}`
          draft: false
          prerelease: false
